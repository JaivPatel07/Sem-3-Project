<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="content-box">
        <div class="band-box">
            <p><h2 style="font-size: 2rem; margin-bottom: 10px;">EduSphere</h2>Skill Up your self by learning with<br>our worl-class courses and expert mentors.</p>
            <div class="circle-decoration"></div>
            <div class="circle-decoration circle-2"></div>
        </div>

        <div class="form-box">
            <div class="form-box-body">
                <div class="form-title">Welcome Back</div>
                <p style="font-size: 12px; margin-top: 5px;">Please enter your details to move.</p>

                <form action="#">
                    <div id="name-field" class="non-active">
                        <label for="name">Name</label>
                        <input type="name" placeholder="name" id="user_name" required>
                        <span class="error" id="name_error">Name can't be blank!!!</span>
                    </div>
                    
                    <label for="email">Email Address</label>
                    <input type="email" placeholder="name@gmail.com" id="user_email" required>
                    <span class="error" id="email_error">In Valid Email Formate!!!</span>
                    

                    <label for="pass">Password</label>
                    <input type="password" placeholder="Enter Password (@,_,0-9,a-z,A-Z)..." id="user_pass" required>
                    <span class="error" id="pass_error">In Valid Password Formate!!!</span>


                    <button type="submit" id="sub_btn">Sign In</button>
                    <button style="background-color: white; color: blue; margin: 2px;" id="btn">Sign up</button>
                </form>

                <span class="error" id="main_error"></span>
            </div>
        </div>
    </div>
    
    <script>
        const title = document.querySelector('.form-title')
        const name_field = document.getElementById('name-field')
        const btn = document.getElementById('btn')
        const submit_btn = document.getElementById('sub_btn')


        const user_name = document.getElementById('user_name')
        const user_email = document.getElementById('user_email')
        const user_pass = document.getElementById('user_pass')

        // to display errors-------------------
        const name_error = document.getElementById('name_error')
        const email_error = document.getElementById('email_error')
        const pass_error = document.getElementById('pass_error')
        const main_error = document.getElementById('main_error')

        // to store user_data-------------------------
        user_data = {}

        let signup = false;
        btn.addEventListener('click',() => {
            signup = !signup
            
            if (signup) {
                title.innerHTML = 'Create Account'
                name_field.classList.remove('non-active')
                submit_btn.innerText = 'Sign up'
                btn.innerText = 'Sign in'
            }
            else {
                title.innerHTML = 'Welcome Back'
                name_field.classList.add('non-active')
                submit_btn.innerText = 'Sign in'
                btn.innerText = 'Sign up'
            }

        })

        // to do form validation-------------------
        submit_btn.addEventListener('click', (e) => {
            e.preventDefault()

            let flag = false
            user_data = {}

            // Name validation (only for signup)--------------------------
            if (signup) {
                if (user_name.value.trim() !== '') {
                    user_data.name = user_name.value
                    name_error.classList.remove('show_error')
                } else {
                    name_error.classList.add('show_error')
                    flag = true
                }
            }

            // Email validation----------------
            if (
                user_email.value.length >= 13 &&
                user_email.value.endsWith('@gmail.com')
            ) {
                user_data.email = user_email.value
                email_error.classList.remove('show_error')
            } else {
                email_error.classList.add('show_error')
                flag = true
            }

            // Password validation--------------------
            if (
                user_pass.value.length > 6 &&
                (user_pass.value.includes('@') || user_pass.value.includes('_'))
            ) {
                user_data.password = user_pass.value
                pass_error.classList.remove('show_error')
            } else {
                pass_error.classList.add('show_error')
                flag = true
            }

            if (!flag) {
                console.log(user_data)
            }
        })

        
    </script>
</body>
</html>
